<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1">
      <!-- tr : 테이블 행 (가로줄 만들어줌) -->
      <!-- 
      합치기
        colspan="2" : 2개의 열을 합침
        rowspan="2" : 2개의 행을 합침

      -->
      <tr>
        <th colspan="2">1행</th>
      </tr>
      <tr>
        <td>이름</td>
        <td>홍길동</td>
      </tr>
      <tr>
        <td>전화번호</td>
        <td>010-1234-5678</td>
      </tr>
    </table>
  </body>
</html>
